<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
        <title>MovieFy - {{ title }}</title>
    {% else %}
        <title>MovieFy</title>
    {% endif %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <style>
        #main-content { transition: margin-left 0.3s ease-in-out; }
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body id="body-auth-layout" class="flex bg-slate-950 overflow-x-hidden">

    <button id="sidebarToggle" class="fixed top-4 left-4 z-50 p-2 bg-blue-900 text-white rounded-md focus:outline-none hover:bg-blue-800 transition-all">
        <svg id="hamburgerIcon" class="w-6 h-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-30 xl:hidden"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-screen w-64 bg-gray-900 z-40 transform -translate-x-full transition-transform duration-300">
        <div class="h-full bg-gradient-to-r from-slate-800 via-slate-900 to-blue-950 shadow-2xl flex flex-col px-3 py-16">

            <div class="flex mt-3 items-center gap-1">
                <img src="{{url_for('static', filename='icons/tao.png')}}" class="w-10 h-10 bg-white rounded-full border-2 border-white">
                <h1 class="text-md font-bold tracking-wide text-white font-light" style="font-family: Arial, Helvetica, sans-serif">{{current_user.username}}</h1>
            </div>

            <div class="flex flex-col justify-center items-start gap-1 mt-10">
                <h1 class="text-white text-center text-[13px] font-serif">Main Menu</h1>
                <hr class="w-16 border-gray-600">
            </div>

            <div class="flex flex-col mt-4 gap-2 font-light text-white text-sm">
                <a href="{{ url_for('auth_user') }}" class="flex items-center gap-3 px-3 py-2 w-full rounded-xl transition {% if request.endpoint == 'auth_user' %} bg-blue-900 {% else %} hover:bg-white/10 {% endif %}">
                    <img src="{{ url_for('static', filename='icons/dashboard.png') }}" class="w-3 h-3">
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('movies') }}" class="flex items-center justify gap-3 px-3 py-2 w-full rounded-xl transition {% if request.endpoint == 'movies' %} bg-blue-900 {% else %} hover:bg-white/10 {% endif %}">
                    <img src="{{ url_for('static', filename='icons/movie.png') }}" class="w-3 h-3">
                    <span>Movies</span>
                </a>
                <a href="{{ url_for('favorites') }}" class="flex items-center gap-3 px-3 py-2 w-full rounded-xl transition {% if request.endpoint == 'favorites' %} bg-blue-900 {% else %} hover:bg-white/10 {% endif %}">
                    <img src="{{ url_for('static', filename='icons/favorites.png') }}" class="w-3 h-3">
                    <span>Favorites</span>
                </a>
                <a href="{{ url_for('watchlist') }}" class="flex items-center gap-3 px-3 py-2 w-full rounded-xl transition {% if request.endpoint == 'watchlist' %} bg-blue-900 {% else %} hover:bg-white/10 {% endif %}">
                    <img src="{{ url_for('static', filename='icons/watchlist.png') }}" class="w-3 h-3">
                    <span>Watchlist</span>
                </a>
            </div>

            <div class="flex flex-col justify-center items-start gap-1 mt-auto">
                <h1 class="text-white text-center text-[13px] font-serif">Account Settings</h1>
                <hr class="w-16 border-gray-600">
            </div>
            <div class="mt-2 pb-6 text-sm">
                <a href="{{ url_for('account') }}" class="flex font-light text-white items-center gap-3 px-3 py-2 w-full rounded-xl transition {% if request.endpoint == 'account' %} bg-blue-900 {% else %} hover:bg-white/10 {% endif %}">
                    <img src="{{ url_for('static', filename='icons/tao.png') }}" class="w-6 h-6">
                    <span>Account</span>
                </a>
                <button id="logoutBtn" class="w-full bg-transparent hover:bg-red-700 text-white py-3 rounded-md font-semibold transition mt-2">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <div id="logoutModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-gradient-to-r from-slate-800 via-slate-900 to-blue-950 rounded-xl shadow-xl p-6 w-80 text-center">
            <h2 class="text-lg font-semibold mb-4 text-white">Are you sure you want to logout?</h2>
            <div class="flex justify-center gap-4">
                <a href="/logout" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition">Yes</a>
                <button id="cancelLogout" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition">No</button>
            </div>
        </div>
    </div>

    <main id="main-content" class="flex-1 p-6 min-h-screen">
        <div class="pt-12">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- 1. SIDEBAR LOGIC ---
            const sidebar = document.getElementById("sidebar");
            const mainContent = document.getElementById("main-content");
            const toggleBtn = document.getElementById("sidebarToggle");
            const overlay = document.getElementById("sidebarOverlay");
            const hamburgerIcon = document.getElementById("hamburgerIcon");

            let sidebarOpen = window.innerWidth >= 1280;

            function applySidebarState() {
                const isDesktop = window.innerWidth >= 1280;
                if (sidebarOpen) {
                    sidebar.classList.remove("-translate-x-full");
                    if (hamburgerIcon) hamburgerIcon.classList.add("rotate-90");
                    if (isDesktop) {
                        mainContent.style.marginLeft = "256px";
                        if (overlay) overlay.classList.add("hidden");
                    } else {
                        mainContent.style.marginLeft = "0";
                        if (overlay) overlay.classList.remove("hidden");
                    }
                } else {
                    sidebar.classList.add("-translate-x-full");
                    if (hamburgerIcon) hamburgerIcon.classList.remove("rotate-90");
                    mainContent.style.marginLeft = "0";
                    if (overlay) overlay.classList.add("hidden");
                }
            }

            if (toggleBtn) {
                toggleBtn.addEventListener("click", () => {
                    sidebarOpen = !sidebarOpen;
                    applySidebarState();
                });
            }
            if (overlay) overlay.addEventListener("click", () => { sidebarOpen = false; applySidebarState(); });
            window.addEventListener("resize", applySidebarState);
            applySidebarState();

            // --- 2. LOGOUT MODAL ---
            const logoutBtn = document.getElementById("logoutBtn");
            const logoutModal = document.getElementById("logoutModal");
            const cancelLogout = document.getElementById("cancelLogout");

            if (logoutBtn) logoutBtn.onclick = () => logoutModal.classList.remove("hidden");
            if (cancelLogout) cancelLogout.onclick = () => logoutModal.classList.add("hidden");

            // --- 3. TRAILER MODAL ---
            const trailerModal = document.getElementById('trailerModal');
            const trailerFrame = document.getElementById('trailerFrame');
            const closeTrailerBtn = document.getElementById('closeTrailerBtn');
            const openButtons = document.querySelectorAll('.openTrailerBtn');

            openButtons.forEach(btn => {
                btn.onclick = function() {
                    const rawUrl = this.getAttribute('data-url');
                    if (rawUrl && rawUrl !== "N/A" && trailerFrame && trailerModal) {
                        let videoId = rawUrl.includes('v=') ? rawUrl.split('v=')[1].split('&')[0] : rawUrl.split('/').pop();
                        trailerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                        trailerModal.classList.remove('hidden');
                        document.body.style.overflow = 'hidden'; 
                    }
                };
            });

            const closeTrailer = () => {
                if (trailerModal) trailerModal.classList.add('hidden');
                if (trailerFrame) trailerFrame.src = "";
                document.body.style.overflow = 'auto';
            };
            if (closeTrailerBtn) closeTrailerBtn.onclick = closeTrailer;

            // --- 4. FAVORITE / WATCHLIST MODAL ---
            const addFavBtns = document.querySelectorAll(".addFavBtn, .addWatchBtn");
            const addFavModal = document.getElementById("addFavModal");
            const closeAddFolderBtn = document.getElementById("closeAddFolderBtn");
            const form = document.getElementById("addMovieForm");

            addFavBtns.forEach(btn => {
                btn.onclick = function() {
                    if (!addFavModal) return;
                    if (document.getElementById("movieTitle")) document.getElementById("movieTitle").value = this.dataset.title;
                    if (document.getElementById("movieYear")) document.getElementById("movieYear").value = this.dataset.year;
                    if (document.getElementById("movieOriginalLanguage")) document.getElementById("movieOriginalLanguage").value = this.dataset.original_language;
                    if (document.getElementById("movieTrailer")) document.getElementById("movieTrailer").value = this.dataset.trailer;
                    if (document.getElementById("moviePoster")) document.getElementById("moviePoster").value = this.dataset.poster;

                    const currentType = this.dataset.type;
                    if (form) form.action = `/add_movie/${currentType}`;

                    document.querySelectorAll(".folder-btn").forEach(fBtn => {
                        fBtn.classList.toggle("hidden", fBtn.dataset.category !== currentType);
                    });
                    addFavModal.classList.remove("hidden");
                };
            });
            if (closeAddFolderBtn) closeAddFolderBtn.onclick = () => addFavModal.classList.add("hidden");

            // --- 5. OPTIONAL FOLDER MODAL (IF EXISTS) ---
            const folderBtn = document.getElementById("folderBtn");
            const folderModal = document.getElementById("folderModal");
            const cancelFolder = document.getElementById("cancelFolder");
            if (folderBtn) folderBtn.onclick = () => folderModal.classList.remove("hidden");
            if (cancelFolder) cancelFolder.onclick = () => folderModal.classList.add("hidden");

            // --- 6. REMOVE MODAL LOGIC ---
            document.querySelectorAll('[id^="removeBtn-"]').forEach(btn => {
                btn.onclick = () => {
                    const index = btn.id.split('-')[1];
                    const modal = document.getElementById(`removeModal-${index}`);
                    if (modal) modal.classList.remove('hidden');
                };
            });
            document.querySelectorAll('[id^="cancelRemove-"]').forEach(btn => {
                btn.onclick = () => {
                    const modalId = btn.dataset.modal;
                    const modal = document.getElementById(modalId);
                    if (modal) modal.classList.add('hidden');
                };
            });
        });
    </script>
</body>
</html>
